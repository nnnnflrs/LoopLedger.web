<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 800" width="360" height="800">
  <defs>
    <linearGradient id="amberGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff8c42" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ff8c42" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="360" height="800" fill="#0d0d0f" rx="0"/>

  <g transform="translate(0, 22)">
  <!-- Header -->
  <text x="20" y="38" font-family="Outfit, sans-serif" font-size="22" font-weight="400" fill="#e8e4df" opacity="0.7">&#x2039;</text>
  <text x="180" y="38" font-family="Outfit, sans-serif" font-size="18" font-weight="700" fill="#e8e4df" text-anchor="middle">Budget Estimator</text>

  <!-- FERRIES Section Label -->
  <text x="20" y="76" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" fill="#5a5652" letter-spacing="1.5">FERRIES</text>

  <!-- Ferries Card -->
  <rect x="16" y="88" width="328" height="198" rx="16" fill="#161618" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- Explanation text -->
  <text x="36" y="114" font-family="Outfit, sans-serif" font-size="13" fill="#9a9590">
    <tspan x="36" dy="0">6 ferry crossings are required for the Loop.</tspan>
    <tspan x="36" dy="18">Add more if you plan extra island hops.</tspan>
  </text>

  <!-- AVG FEE / CROSSING row -->
  <text x="36" y="162" font-family="JetBrains Mono, monospace" font-size="11" font-weight="500" fill="#5a5652" letter-spacing="0.5">AVG FEE / CROSSING</text>
  <!-- Input field -->
  <rect x="232" y="146" width="96" height="32" rx="10" fill="#1e1e22" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="280" y="167" font-family="JetBrains Mono, monospace" font-size="14" font-weight="600" fill="#e8e4df" text-anchor="middle">&#x20B1; 500</text>

  <!-- CROSSINGS row -->
  <text x="36" y="206" font-family="JetBrains Mono, monospace" font-size="11" font-weight="500" fill="#5a5652" letter-spacing="0.5">CROSSINGS</text>
  <!-- Stepper -->
  <rect x="232" y="190" width="96" height="32" rx="10" fill="#1e1e22" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="248" y="211" font-family="Outfit, sans-serif" font-size="16" font-weight="600" fill="#9a9590" text-anchor="middle">&#x2212;</text>
  <text x="280" y="211" font-family="JetBrains Mono, monospace" font-size="14" font-weight="700" fill="#e8e4df" text-anchor="middle">6</text>
  <text x="312" y="211" font-family="Outfit, sans-serif" font-size="16" font-weight="600" fill="#ff8c42" text-anchor="middle">+</text>

  <!-- Dashed divider inside card -->
  <line x1="36" y1="238" x2="324" y2="238" stroke="rgba(255,255,255,0.06)" stroke-width="1" stroke-dasharray="8 6"/>

  <!-- FERRY TOTAL row -->
  <text x="36" y="268" font-family="JetBrains Mono, monospace" font-size="12" font-weight="600" fill="#5a5652" letter-spacing="0.5">FERRY TOTAL</text>
  <text x="324" y="268" font-family="JetBrains Mono, monospace" font-size="16" font-weight="800" fill="#ff8c42" text-anchor="end">&#x20B1;3,000</text>

  <!-- Calculate Button -->
  <rect x="16" y="302" width="328" height="56" rx="14" fill="#ff8c42"/>
  <text x="180" y="336" font-family="Outfit, sans-serif" font-size="16" font-weight="700" fill="#0d0d0f" text-anchor="middle">Calculate Estimate</text>

  <!-- Dashed divider -->
  <line x1="20" y1="378" x2="340" y2="378" stroke="rgba(255,255,255,0.06)" stroke-width="1" stroke-dasharray="8 6"/>

  <!-- Estimated Total Card -->
  <rect x="16" y="394" width="328" height="140" rx="16" fill="#161618" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <!-- Amber glow behind total -->
  <rect x="16" y="394" width="328" height="140" rx="16" fill="url(#amberGlow)"/>

  <text x="180" y="426" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" fill="#5a5652" text-anchor="middle" letter-spacing="1.5">ESTIMATED TOTAL</text>

  <text x="180" y="484" font-family="JetBrains Mono, monospace" font-size="44" font-weight="800" fill="#ff8c42" text-anchor="middle">&#x20B1;48,200</text>

  <text x="162" y="518" font-family="JetBrains Mono, monospace" font-size="16" font-weight="600" fill="#e8e4df" text-anchor="end">&#x20B1;2,411</text>
  <text x="166" y="518" font-family="Outfit, sans-serif" font-size="13" fill="#5a5652"> / DAY</text>

  <!-- BREAKDOWN Section Label -->
  <text x="20" y="560" font-family="JetBrains Mono, monospace" font-size="11" font-weight="600" fill="#5a5652" letter-spacing="1.5">BREAKDOWN</text>

  <!-- Breakdown Card -->
  <rect x="16" y="572" width="328" height="186" rx="16" fill="#161618" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- Row 1: GAS -->
  <circle cx="36" cy="596" r="4" fill="#ff8c42"/>
  <text x="52" y="600" font-family="Outfit, sans-serif" font-size="13" font-weight="600" fill="#e8e4df">GAS</text>
  <text x="324" y="600" font-family="JetBrains Mono, monospace" font-size="13" font-weight="600" fill="#e8e4df" text-anchor="end">&#x20B1;11,200</text>
  <line x1="36" y1="610" x2="324" y2="610" stroke="rgba(255,255,255,0.06)" stroke-width="1" stroke-dasharray="8 6"/>

  <!-- Row 2: FOOD -->
  <circle cx="36" cy="626" r="4" fill="#00d4aa"/>
  <text x="52" y="630" font-family="Outfit, sans-serif" font-size="13" font-weight="600" fill="#e8e4df">FOOD</text>
  <text x="324" y="630" font-family="JetBrains Mono, monospace" font-size="13" font-weight="600" fill="#e8e4df" text-anchor="end">&#x20B1;8,400</text>
  <line x1="36" y1="640" x2="324" y2="640" stroke="rgba(255,255,255,0.06)" stroke-width="1" stroke-dasharray="8 6"/>

  <!-- Row 3: HOTEL -->
  <circle cx="36" cy="656" r="4" fill="#a55eea"/>
  <text x="52" y="660" font-family="Outfit, sans-serif" font-size="13" font-weight="600" fill="#e8e4df">HOTEL</text>
  <text x="324" y="660" font-family="JetBrains Mono, monospace" font-size="13" font-weight="600" fill="#e8e4df" text-anchor="end">&#x20B1;12,000</text>
  <line x1="36" y1="670" x2="324" y2="670" stroke="rgba(255,255,255,0.06)" stroke-width="1" stroke-dasharray="8 6"/>

  <!-- Row 4: FERRY -->
  <circle cx="36" cy="686" r="4" fill="#4facfe"/>
  <text x="52" y="690" font-family="Outfit, sans-serif" font-size="13" font-weight="600" fill="#e8e4df">FERRY</text>
  <text x="324" y="690" font-family="JetBrains Mono, monospace" font-size="13" font-weight="600" fill="#e8e4df" text-anchor="end">&#x20B1;3,000</text>
  <line x1="36" y1="700" x2="324" y2="700" stroke="rgba(255,255,255,0.06)" stroke-width="1" stroke-dasharray="8 6"/>

  <!-- Row 5: MAINT -->
  <circle cx="36" cy="716" r="4" fill="#ff6348"/>
  <text x="52" y="720" font-family="Outfit, sans-serif" font-size="13" font-weight="600" fill="#e8e4df">MAINT</text>
  <text x="324" y="720" font-family="JetBrains Mono, monospace" font-size="13" font-weight="600" fill="#e8e4df" text-anchor="end">&#x20B1;3,600</text>
  <line x1="36" y1="730" x2="324" y2="730" stroke="rgba(255,255,255,0.06)" stroke-width="1" stroke-dasharray="8 6"/>

  <!-- Row 6: MISC -->
  <circle cx="36" cy="746" r="4" fill="#636e72"/>
  <text x="52" y="750" font-family="Outfit, sans-serif" font-size="13" font-weight="600" fill="#e8e4df">MISC</text>
  <text x="324" y="750" font-family="JetBrains Mono, monospace" font-size="13" font-weight="600" fill="#e8e4df" text-anchor="end">&#x20B1;10,000</text>

  <!-- Footnote -->
  <text x="180" y="774" font-family="JetBrains Mono, monospace" font-size="8" font-weight="500" fill="#5a5652" text-anchor="middle" letter-spacing="0.5">&#x2726; ESTIMATES BASED ON COMMUNITY DATA. ACTUAL COSTS MAY VARY.</text>
  </g>
</svg>