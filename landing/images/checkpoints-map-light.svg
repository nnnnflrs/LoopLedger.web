    <circle cx="34" cy="716" r="8" fill="none" stroke="#4facfe" stroke-width="1.3" opacity="0.4"/>
    <text x="50" y="720" fill="#a8a29e" font-family="'Outfit', sans-serif" font-size="11.5" font-weight="500">Negros Occidental</text>
    <text x="340" y="720" fill="#a8a29e" font-family="'Outfit', sans-serif" font-size="9.5" text-anchor="end" opacity="0.6">Iloilo</text>
