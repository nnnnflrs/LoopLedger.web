<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 800" width="360" height="800">

  <!-- Background -->
  <rect width="360" height="800" fill="#f5f2ed"/>

  <g transform="translate(0, 22)">

    <!-- ========== HEADER ========== -->
    <text x="20" y="34" fill="#1a1816" font-family="'Outfit', sans-serif" font-size="22" font-weight="600">&#x2039;</text>
    <text x="180" y="34" fill="#1a1816" font-family="'Outfit', sans-serif" font-size="18" font-weight="600" text-anchor="middle">Checkpoints</text>
