    <!-- Ferry unvisited 5: Iloilo — Batangas -->
    <circle cx="34" cy="744" r="8" fill="none" stroke="#4facfe" stroke-width="1.3" opacity="0.4"/>
    <text x="50" y="748" fill="#a8a29e" font-family="'Outfit', sans-serif" font-size="11.5" font-weight="500">Iloilo</text>
    <text x="340" y="748" fill="#a8a29e" font-family="'Outfit', sans-serif" font-size="9.5" text-anchor="end" opacity="0.6">Batangas</text>
    <line x1="50" y1="758" x2="340" y2="758" stroke="rgba(0,0,0,0.08)" stroke-width="1"/>

