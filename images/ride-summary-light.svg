<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 800" width="360" height="800">
  <defs>
    <filter id="tealGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#00d4aa" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="360" height="800" fill="#f5f2ed"/>

  <g transform="translate(0, 22)">
  <!-- Header -->
  <text x="20" y="38" font-family="Outfit, sans-serif" font-size="22" fill="#1a1816" font-weight="300">&#x2039;</text>
  <text x="180" y="38" font-family="Outfit, sans-serif" font-size="18" fill="#1a1816" font-weight="700" text-anchor="middle">Ride Summary</text>

  <!-- ============ CURRENTLY RIDING CARD ============ -->
  <rect x="16" y="58" width="328" height="210" rx="16" fill="#ffffff" stroke="#00d4aa" stroke-width="1" stroke-opacity="0.5" filter="url(#tealGlow)"/>

  <!-- Currently riding label -->
  <circle cx="34" cy="82" r="4" fill="#00d4aa"/>
  <text x="46" y="86" font-family="JetBrains Mono, monospace" font-size="10" fill="#00d4aa" letter-spacing="2">CURRENTLY RIDING</text>

  <!-- Day 14 row -->
  <text x="34" y="112" font-family="Outfit, sans-serif" font-size="20" fill="#1a1816" font-weight="700">Day 14</text>
  <text x="328" y="106" font-family="JetBrains Mono, monospace" font-size="14" fill="#1a1816" font-weight="700" text-anchor="end">&#x20B1;3,200</text>
  <text x="328" y="120" font-family="JetBrains Mono, monospace" font-size="11" fill="#00d4aa" text-anchor="end">186 km</text>

  <!-- Date -->
  <text x="34" y="130" font-family="Outfit, sans-serif" font-size="11" fill="#6b6560">Mar 21, 2026</text>

  <!-- FROM -->
  <text x="34" y="152" font-family="JetBrains Mono, monospace" font-size="8" fill="#a8a29e" letter-spacing="1">FROM</text>
  <text x="80" y="152" font-family="Outfit, sans-serif" font-size="12" fill="#1a1816">Legazpi City, Albay</text>

  <!-- TO -->
  <text x="34" y="170" font-family="JetBrains Mono, monospace" font-size="8" fill="#a8a29e" letter-spacing="1">TO</text>
  <text x="80" y="170" font-family="Outfit, sans-serif" font-size="12" fill="#6b6560">—</text>

  <!-- ODO -->
  <text x="34" y="188" font-family="JetBrains Mono, monospace" font-size="8" fill="#a8a29e" letter-spacing="1">ODO</text>
  <text x="80" y="188" font-family="JetBrains Mono, monospace" font-size="12" fill="#1a1816">8,245 &#x2192;</text>

  <!-- TIME -->
  <text x="34" y="206" font-family="JetBrains Mono, monospace" font-size="8" fill="#a8a29e" letter-spacing="1">TIME</text>
  <text x="80" y="206" font-family="JetBrains Mono, monospace" font-size="12" fill="#1a1816">6:30 AM — —</text>

  <!-- Dashed divider -->
  <line x1="32" y1="222" x2="328" y2="222" stroke="rgba(0,0,0,0.08)" stroke-width="1" stroke-dasharray="8 6"/>

  <!-- Share summary -->
  <text x="180" y="242" font-family="Outfit, sans-serif" font-size="11" fill="#6b6560" text-anchor="middle">
    <tspan fill="#a8a29e">&#x2197;</tspan> SHARE SUMMARY
  </text>

  <!-- ============ COMPLETED DAYS SECTION ============ -->
  <text x="20" y="290" font-family="JetBrains Mono, monospace" font-size="10" fill="#a8a29e" letter-spacing="2">COMPLETED DAYS</text>
  <line x1="148" y1="286" x2="340" y2="286" stroke="rgba(0,0,0,0.08)" stroke-width="1" stroke-dasharray="8 6"/>

  <!-- ============ DAY 13 CARD ============ -->
  <rect x="16" y="304" width="328" height="310" rx="16" fill="#ffffff" stroke="rgba(0,0,0,0.08)" stroke-width="1"/>

  <!-- Day 13 header -->
  <text x="34" y="334" font-family="Outfit, sans-serif" font-size="20" fill="#1a1816" font-weight="700">Day 13</text>
  <text x="328" y="328" font-family="JetBrains Mono, monospace" font-size="14" fill="#1a1816" font-weight="700" text-anchor="end">&#x20B1;4,120</text>
  <text x="328" y="342" font-family="JetBrains Mono, monospace" font-size="11" fill="#00d4aa" text-anchor="end">210 km</text>

  <!-- Date -->
  <text x="34" y="352" font-family="Outfit, sans-serif" font-size="11" fill="#6b6560">Mar 20, 2026</text>

  <!-- FROM -->
  <text x="34" y="374" font-family="JetBrains Mono, monospace" font-size="8" fill="#a8a29e" letter-spacing="1">FROM</text>
  <text x="80" y="374" font-family="Outfit, sans-serif" font-size="12" fill="#1a1816">Naga City, Camarines Sur</text>

  <!-- TO -->
  <text x="34" y="392" font-family="JetBrains Mono, monospace" font-size="8" fill="#a8a29e" letter-spacing="1">TO</text>
  <text x="80" y="392" font-family="Outfit, sans-serif" font-size="12" fill="#1a1816">Legazpi City, Albay</text>

  <!-- ODO -->
  <text x="34" y="410" font-family="JetBrains Mono, monospace" font-size="8" fill="#a8a29e" letter-spacing="1">ODO</text>
  <text x="80" y="410" font-family="JetBrains Mono, monospace" font-size="12" fill="#1a1816">8,035 &#x2192; 8,245</text>

  <!-- TIME -->
  <text x="34" y="428" font-family="JetBrains Mono, monospace" font-size="8" fill="#a8a29e" letter-spacing="1">TIME</text>
  <text x="80" y="428" font-family="JetBrains Mono, monospace" font-size="12" fill="#1a1816">7:15 AM — 4:30 PM</text>

  <!-- Dashed divider -->
  <line x1="32" y1="444" x2="328" y2="444" stroke="rgba(0,0,0,0.08)" stroke-width="1" stroke-dasharray="8 6"/>

  <!-- STOPS label -->
  <text x="34" y="462" font-family="JetBrains Mono, monospace" font-size="8" fill="#a8a29e" letter-spacing="1.5">STOPS</text>

  <!-- Stop 1 -->
  <circle cx="34" cy="484" r="3.5" fill="#ff8c42"/>
  <text x="46" y="488" font-family="Outfit, sans-serif" font-size="13" fill="#1a1816" font-weight="600">Iriga City</text>
  <text x="328" y="488" font-family="JetBrains Mono, monospace" font-size="10" fill="#a8a29e" text-anchor="end">11:30 AM</text>
  <text x="46" y="502" font-family="Outfit, sans-serif" font-size="11" fill="#6b6560">Lunch break at local eatery</text>

  <!-- Connector line between stops -->
  <line x1="34" y1="490" x2="34" y2="516" stroke="rgba(0,0,0,0.08)" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- Stop 2 -->
  <circle cx="34" cy="524" r="3.5" fill="#ff8c42"/>
  <text x="46" y="528" font-family="Outfit, sans-serif" font-size="13" fill="#1a1816" font-weight="600">Ligao, Albay</text>
  <text x="328" y="528" font-family="JetBrains Mono, monospace" font-size="10" fill="#a8a29e" text-anchor="end">2:15 PM</text>
  <text x="46" y="542" font-family="Outfit, sans-serif" font-size="11" fill="#6b6560">Fuel stop and photos of Mayon</text>

  <!-- Dashed divider -->
  <line x1="32" y1="560" x2="328" y2="560" stroke="rgba(0,0,0,0.08)" stroke-width="1" stroke-dasharray="8 6"/>

  <!-- Bottom actions -->
  <text x="34" y="582" font-family="Outfit, sans-serif" font-size="11" fill="#6b6560">
    <tspan fill="#a8a29e">&#x2197;</tspan> SHARE SUMMARY
  </text>
  <!-- Edit icon (pencil) -->
  <rect x="282" y="570" width="18" height="18" rx="4" fill="#f0ece6"/>
  <text x="291" y="583" font-family="Outfit, sans-serif" font-size="11" fill="#a8a29e" text-anchor="middle">&#x270E;</text>
  <!-- Trash icon -->
  <rect x="308" y="570" width="18" height="18" rx="4" fill="#f0ece6"/>
  <text x="317" y="583" font-family="Outfit, sans-serif" font-size="11" fill="#a8a29e" text-anchor="middle">&#x2715;</text>

  <!-- ============ SUMMARY STATS ============ -->
  <!-- Total Distance -->
  <rect x="16" y="630" width="328" height="54" rx="16" fill="#ffffff" stroke="rgba(0,0,0,0.08)" stroke-width="1"/>
  <text x="34" y="662" font-family="Outfit, sans-serif" font-size="13" fill="#6b6560" font-weight="500">TOTAL DISTANCE</text>
  <text x="328" y="662" font-family="JetBrains Mono, monospace" font-size="20" fill="#00d4aa" font-weight="700" text-anchor="end">2,847 km</text>

  <!-- Total Spend -->
  <rect x="16" y="694" width="328" height="54" rx="16" fill="#ffffff" stroke="rgba(0,0,0,0.08)" stroke-width="1"/>
  <text x="34" y="726" font-family="Outfit, sans-serif" font-size="13" fill="#6b6560" font-weight="500">TOTAL SPEND</text>
  <text x="328" y="726" font-family="JetBrains Mono, monospace" font-size="20" fill="#ff8c42" font-weight="700" text-anchor="end">&#x20B1;38,450</text>
  </g>
</svg>