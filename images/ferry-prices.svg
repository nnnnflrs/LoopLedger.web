  <text x="136" y="168" font-family="Outfit, sans-serif" font-size="16" font-weight="600" fill="#ff8c42">&#x2192;</text>
  <text x="156" y="168" font-family="Outfit, sans-serif" font-size="16" font-weight="700" fill="#e8e4df">Caticlan</text>

  <line x1="36" y1="180" x2="324" y2="180" stroke="rgba(255,255,255,0.06)" stroke-width="1" stroke-dasharray="8 6"/>

  <!-- Motorcycle column -->
  <text x="36" y="200" font-family="JetBrains Mono, monospace" font-size="10" font-weight="500" fill="#5a5652" letter-spacing="0.5">MOTORCYCLE</text>
  <text x="36" y="218" font-family="JetBrains Mono, monospace" font-size="16" font-weight="700" fill="#e8e4df">&#x20B1;560</text>

