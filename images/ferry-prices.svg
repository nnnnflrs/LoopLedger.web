  <rect x="16" y="632" width="328" height="152" rx="16" fill="#161618" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <text x="36" y="660" font-family="Outfit, sans-serif" font-size="16" font-weight="700" fill="#e8e4df">Liloan</text>
  <text x="96" y="660" font-family="Outfit, sans-serif" font-size="16" font-weight="600" fill="#ff8c42">&#x2192;</text>
