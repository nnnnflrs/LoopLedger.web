  <rect x="124" y="230" width="40" height="22" rx="6" fill="rgba(255,255,255,0.04)"/>
  <text x="144" y="244" font-family="JetBrains Mono, monospace" font-size="10" font-weight="500" fill="#9a9590" text-anchor="middle">2.5h</text>

