  <text x="137" y="736" font-family="JetBrains Mono, monospace" font-size="10" font-weight="500" fill="#9a9590" text-anchor="middle">3h</text>

  <text x="324" y="736" font-family="JetBrains Mono, monospace" font-size="10" fill="#5a5652" text-anchor="end">Mar 10, 2026</text>

  <!-- Votes -->
  <text x="36" y="768" font-family="Outfit, sans-serif" font-size="14" fill="#00d4aa">&#x25B2;</text>
  <text x="52" y="768" font-family="JetBrains Mono, monospace" font-size="12" font-weight="600" fill="#00d4aa">15</text>
  <text x="72" y="768" font-family="Outfit, sans-serif" font-size="14" fill="#5a5652">&#x25BC;</text>

  <text x="296" y="768" font-family="Outfit, sans-serif" font-size="13" fill="#5a5652">&#x270E;</text>
  <text x="320" y="768" font-family="Outfit, sans-serif" font-size="13" fill="#5a5652">&#x2715;</text>

  <!-- ==================== FAB Button ==================== -->
  <circle cx="316" cy="736" r="28" fill="#ff8c42" filter="url(#fabShadow)"/>
  <text x="316" y="744" font-family="Outfit, sans-serif" font-size="28" font-weight="300" fill="#0d0d0f" text-anchor="middle">+</text>
