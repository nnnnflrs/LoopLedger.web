  <text x="52" y="604" font-family="JetBrains Mono, monospace" font-size="12" font-weight="600" fill="#00d4aa">23</text>
  <text x="72" y="604" font-family="Outfit, sans-serif" font-size="14" fill="#5a5652">&#x25BC;</text>

  <text x="296" y="604" font-family="Outfit, sans-serif" font-size="13" fill="#5a5652">&#x270E;</text>
  <text x="320" y="604" font-family="Outfit, sans-serif" font-size="13" fill="#5a5652">&#x2715;</text>

