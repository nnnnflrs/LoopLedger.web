  <line x1="43" y1="85" x2="47" y2="89" stroke="#5a5652" stroke-width="1.5" stroke-linecap="round"/>
  <text x="56" y="84" font-family="JetBrains Mono, monospace" font-size="12" fill="#5a5652" letter-spacing="0.5">SEARCH ROUTES...</text>

