  <text x="180" y="38" font-family="Outfit, sans-serif" font-size="18" font-weight="700" fill="#e8e4df" text-anchor="middle">Ferry Prices</text>

  <!-- Search Bar -->
  <rect x="16" y="58" width="328" height="44" rx="12" fill="#1e1e22" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
